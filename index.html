<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poshak Story. </title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --cr:#c1121f;--cr-d:#8b0000;--gold:#c9a84c;--gold-l:#e8c97a;
  --cream:#fdf8f2;--dark:#1a1008;--char:#2d2416;--muted:#8a7560;
  --bdr:#e8ddd0;--wh:#fff;
  --ss:0 2px 12px rgba(0,0,0,.08);--sm:0 8px 32px rgba(0,0,0,.12);--sl:0 20px 60px rgba(0,0,0,.18);
  --rad:14px;--tr:all .35s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;cursor:none}
button{cursor:pointer;font-family:inherit}
img{display:block;max-width:100%}
input,select,textarea{font-family:inherit}
.page-in{animation:pgIn .38s ease both}
@keyframes pgIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* CURSOR */
*,*::before,*::after{cursor:none!important}
#cdot{width:22px;height:22px;background:#c1121f;border:3px solid #fff;border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:999999;will-change:transform;box-shadow:0 0 0 2px rgba(193,18,31,.4),0 2px 8px rgba(0,0,0,.5)}
#cring{width:52px;height:52px;border:3px solid #c1121f;border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:999998;opacity:.65;will-change:transform}
#cdot.hov{width:14px;height:14px;background:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,.5)}
#cring.hov{width:70px;height:70px;border-color:#c9a84c;opacity:1}

/* ANN */
.ann{background:var(--dark);color:var(--gold-l);padding:9px 0;font-size:12px;letter-spacing:1.8px;font-weight:500;overflow:hidden;white-space:nowrap}
.ann-t{display:inline-block;animation:ann 36s linear infinite}
@keyframes ann{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:var(--wh);box-shadow:var(--ss);position:sticky;top:0;z-index:1000;height:74px;border-bottom:1px solid var(--bdr)}
.logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;padding:0}
.logo-img{width:56px;height:56px;object-fit:contain}
.brand{font-family:'Cormorant Garamond',serif;font-size:29px;font-weight:600;color:var(--dark);letter-spacing:.5px}
.brand em{color:var(--cr);font-style:normal}
.nav{display:flex;gap:2px;align-items:center}
.nav-item{position:relative}
.nav-btn{background:none;border:none;color:var(--char);font-size:12.5px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;padding:26px 14px;display:inline-flex;align-items:center;gap:4px;position:relative;transition:var(--tr)}
.nav-btn::after{content:'';position:absolute;bottom:16px;left:14px;right:14px;height:2px;background:var(--cr);transform:scaleX(0);transition:transform .3s ease;transform-origin:left}
.nav-item:hover .nav-btn{color:var(--cr)}
.nav-item:hover .nav-btn::after{transform:scaleX(1)}
.drop{position:absolute;top:100%;left:50%;transform:translateX(-50%);background:var(--wh);min-width:200px;box-shadow:var(--sl);border-radius:var(--rad);padding:10px 0;border-top:3px solid var(--cr);z-index:999;animation:drop .2s ease}
@keyframes drop{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.drop-btn{display:block;width:100%;background:none;border:none;text-align:left;padding:11px 22px;font-size:13.5px;color:var(--char);transition:var(--tr)}
.drop-btn:hover{background:#fdf3f3;color:var(--cr);padding-left:28px}
.sale-btn{background:none;border:none;color:var(--cr);font-size:12.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:8px 12px}
.r-icons{display:flex;align-items:center;gap:11px}
.sw{position:relative;display:flex;align-items:center}
.sw input{padding:9px 16px 9px 36px;border-radius:25px;border:1.5px solid var(--bdr);background:var(--cream);font-size:13px;width:188px;transition:var(--tr);color:var(--dark);outline:none}
.sw input:focus{border-color:var(--cr);width:228px;box-shadow:0 0 0 3px rgba(193,18,31,.08)}
.sw-ico{position:absolute;left:12px;color:var(--muted);font-size:13px;pointer-events:none}
.ico-btn{position:relative;font-size:20px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:none;border:none;transition:var(--tr)}
.ico-btn:hover{background:#fdf3f3;color:var(--cr);transform:scale(1.1)}
.cbadge{position:absolute;top:1px;right:1px;background:var(--cr);color:#fff;font-size:10px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sr-drop{position:absolute;top:108%;left:0;right:0;background:#fff;border-radius:12px;box-shadow:var(--sl);z-index:999;overflow:hidden;border:1px solid var(--bdr)}
.sr-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border:none;width:100%;background:none;text-align:left;cursor:pointer;transition:background .2s;font-size:13.5px;gap:8px}
.sr-row:hover{background:#fdf3f3}
.sr-p{color:var(--cr);font-weight:600;font-size:13px}
.sr-cat{color:var(--muted);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:6px}
.ham span{width:24px;height:2px;background:var(--dark);border-radius:2px;transition:var(--tr)}
.mob-menu{display:none;position:fixed;inset:0;background:var(--dark);z-index:1050;padding:80px 30px 30px;flex-direction:column;gap:6px;animation:pgIn .3s ease;overflow-y:auto}
.mob-menu.open{display:flex}
.mob-close{position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:28px}
.mob-link{color:rgba(255,255,255,.82);background:none;border:none;text-align:left;font-size:17px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.07);letter-spacing:.5px;display:block;width:100%}
.mob-link:hover{color:var(--gold-l)}

/* HERO */
.hero{position:relative;width:100%;height:88vh;overflow:hidden}
.h-track{display:flex;height:100%;transition:transform .95s cubic-bezier(.77,0,.18,1)}
.h-slide{flex:0 0 100%;height:100%;display:flex;align-items:stretch;position:relative}
.h-cont{width:50%;padding:0 68px;display:flex;flex-direction:column;justify-content:center;z-index:3;background:linear-gradient(105deg,rgba(26,16,8,.93) 55%,transparent 100%)}
.h-eye{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.h-eye::before,.h-eye::after{content:'';flex:0 0 26px;height:1px;background:var(--gold)}
.h-cont h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5vw,66px);font-weight:700;color:#fff;line-height:1.1;margin-bottom:20px}
.h-cont h1 em{color:var(--gold-l);font-style:italic}
.h-cont p{font-size:15px;color:rgba(255,255,255,.75);line-height:1.75;margin-bottom:34px;max-width:368px}
.h-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:8px;background:var(--cr);color:#fff;padding:13px 28px;border-radius:4px;border:2px solid var(--cr);font-size:12.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:var(--tr);cursor:pointer}
.btn-p:hover{background:transparent;border-color:var(--gold);color:var(--gold);transform:translateX(5px)}
.btn-o{background:transparent;border:1.5px solid rgba(255,255,255,.45);color:#fff;padding:13px 24px;border-radius:4px;font-size:12.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:var(--tr);cursor:pointer}
.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.h-img{position:absolute;right:0;top:0;width:55%;height:100%;overflow:hidden}
.h-img img{width:100%;height:100%;object-fit:cover;object-position:center top}
.h-img::before{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(26,16,8,.55) 0%,transparent 50%);z-index:1}
.h-dots{position:absolute;bottom:26px;left:68px;display:flex;gap:10px;z-index:10}
.hdot{width:26px;height:3px;background:rgba(255,255,255,.3);border-radius:2px;border:none;cursor:pointer;transition:var(--tr)}
.hdot.on{background:var(--gold);width:48px}
.harrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:10;transition:var(--tr);cursor:pointer}
.harrow:hover{background:rgba(255,255,255,.25)}
.hp{left:18px}.hn{right:18px}

/* OFFERS */
.offers{background:var(--dark);color:var(--gold-l);padding:12px 0;font-size:12.5px;letter-spacing:2.5px;font-weight:500;text-transform:uppercase;overflow:hidden;white-space:nowrap}
.off-t{display:inline-flex;gap:50px;animation:ofm 34s linear infinite}
@keyframes ofm{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SEC LABEL */
.slabel{text-align:center;margin-bottom:48px}
.seye{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--cr);font-weight:600;display:block;margin-bottom:10px}
.slabel h2{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,4vw,42px);font-weight:600;color:var(--dark);line-height:1.2}
.sln{width:56px;height:2px;background:linear-gradient(90deg,var(--cr),var(--gold));margin:14px auto 0;border-radius:2px}

/* CATS */
.cat-sec{padding:86px 58px;background:var(--cream)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:1200px;margin:0 auto}
.cat-c{position:relative;border-radius:var(--rad);overflow:hidden;height:375px;cursor:pointer;box-shadow:var(--sm);border:none;background:none;padding:0;display:block}
.cat-c img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.cat-c:hover img{transform:scale(1.08)}
.cat-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,16,8,.86) 0%,rgba(26,16,8,.18) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:26px;transition:var(--tr)}
.cat-c:hover .cat-ov{background:linear-gradient(to top,rgba(193,18,31,.72) 0%,rgba(26,16,8,.28) 60%,transparent 100%)}
.cat-ov h3{font-family:'Cormorant Garamond',serif;font-size:27px;color:#fff;font-weight:600;margin-bottom:5px}
.cat-ov p{font-size:11.5px;color:rgba(255,255,255,.7);letter-spacing:2px;text-transform:uppercase}
.cat-arr{position:absolute;bottom:26px;right:26px;background:var(--cr);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transform:translateX(20px);opacity:0;transition:var(--tr)}
.cat-c:hover .cat-arr{transform:translateX(0);opacity:1}

/* FEATURES */
.feat{background:var(--wh);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:38px 58px}
.feat-g{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;max-width:980px;margin:0 auto}
.feat-i{text-align:center;padding:8px}
.ficon{font-size:30px;margin-bottom:12px;display:block}
.feat-i h4{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:4px;color:var(--dark)}
.feat-i p{font-size:12px;color:var(--muted)}

/* TESTIMONIALS */
.test-sec{padding:86px 58px;background:var(--dark)}
.test-sec .slabel h2{color:#fff}
.test-g{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;max-width:1100px;margin:0 auto}
.test-c{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.2);border-radius:var(--rad);padding:28px;transition:var(--tr)}
.test-c:hover{border-color:var(--gold);transform:translateY(-4px)}
.stars{color:var(--gold);font-size:15px;margin-bottom:13px;letter-spacing:2px}
.test-c blockquote{font-size:14.5px;color:rgba(255,255,255,.76);line-height:1.75;margin-bottom:18px;font-style:italic}
.rname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold-l);font-weight:600}
.rtag{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px}

/* NEWSLETTER */
.nl-sec{padding:76px 58px;background:linear-gradient(135deg,#fdf3f3,var(--cream));text-align:center;border-top:1px solid var(--bdr)}
.nl-sec h2{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;margin-bottom:10px;color:var(--dark)}
.nl-sec p{color:var(--muted);font-size:14.5px;margin-bottom:26px}
.nl-f{display:flex;max-width:430px;margin:0 auto}
.nl-f input{flex:1;padding:12px 16px;border:1.5px solid var(--bdr);border-right:none;border-radius:var(--rad) 0 0 var(--rad);font-size:13.5px;background:#fff;outline:none;transition:border-color .2s}
.nl-f input:focus{border-color:var(--cr)}
.nl-f button{padding:12px 24px;background:var(--cr);color:#fff;border:none;border-radius:0 var(--rad) var(--rad) 0;font-size:12.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:var(--tr)}
.nl-f button:hover{background:var(--cr-d)}

/* PAGE HDR */
.pgh{background:linear-gradient(135deg,var(--dark) 0%,#3d1515 100%);padding:56px 58px 46px;text-align:center;position:relative;overflow:hidden}
.pgh::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a84c' fill-opacity='0.07'%3E%3Cpath d='M30 0l30 30-30 30L0 30z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.pg-eye{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:11px}
.pg-ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,50px);font-weight:600;color:#fff;margin:0}
.pg-ln{width:56px;height:2px;background:linear-gradient(90deg,var(--cr),var(--gold));margin:17px auto 0;border-radius:2px}
.back-l{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;margin:24px 58px;border:none;background:none;transition:color .2s}
.back-l:hover{color:var(--cr)}

/* PRODUCTS */
.ps{padding:36px 58px 84px}
.fbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:10px}
.rcnt{font-size:13.5px;color:var(--muted)}
.fchips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:25px;border:1.5px solid var(--bdr);background:transparent;font-size:12px;font-weight:500;color:var(--char);cursor:pointer;transition:var(--tr);letter-spacing:.5px}
.chip.on,.chip:hover{border-color:var(--cr);color:var(--cr);background:#fdf3f3}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:26px}
.pcard{background:var(--wh);border-radius:var(--rad);overflow:hidden;box-shadow:var(--ss);transition:var(--tr);position:relative}
.pcard:hover{transform:translateY(-8px);box-shadow:var(--sl)}
.piw{position:relative;overflow:hidden;height:295px;background:#f7f0e8;cursor:pointer}
.piw img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.pcard:hover .piw img{transform:scale(1.06)}
.pbadge{position:absolute;top:13px;left:13px;background:var(--cr);color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:4px}
.pbadge.gld{background:var(--gold);color:var(--dark)}
.pah{position:absolute;top:13px;right:13px;display:flex;flex-direction:column;gap:8px;transform:translateX(52px);opacity:0;transition:var(--tr)}
.pcard:hover .pah{transform:translateX(0);opacity:1}
.actb{width:34px;height:34px;background:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:var(--tr);cursor:pointer}
.actb:hover{background:var(--cr);color:#fff;transform:scale(1.1)}
.pinfo{padding:16px 16px 18px}
.pinfo h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--dark);margin-bottom:5px;line-height:1.3;cursor:pointer}
.pinfo h3:hover{color:var(--cr)}
.psub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:11px}
.prow{display:flex;align-items:center;gap:9px;margin-bottom:13px;flex-wrap:wrap}
.price{font-size:19px;font-weight:600;color:var(--cr);font-family:'Cormorant Garamond',serif}
.pold{font-size:13.5px;color:var(--muted);text-decoration:line-through}
.pdisc{font-size:10.5px;background:#e8faf0;color:#218838;padding:2px 7px;border-radius:4px;font-weight:600}
.addb{width:100%;background:var(--dark);color:#fff;border:2px solid var(--dark);padding:10px 14px;border-radius:8px;font-size:12.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:8px}
.addb:hover{background:var(--cr);border-color:var(--cr)}
.addb.done{background:#218838;border-color:#218838}

/* DETAIL */
.pd-wrap{display:grid;grid-template-columns:1fr 1fr;gap:50px;max-width:1100px;margin:0 auto;padding:50px 58px}
.pd-main{border-radius:var(--rad);overflow:hidden;height:510px;background:#f7f0e8}
.pd-main img{width:100%;height:100%;object-fit:cover}
.pd-info{display:flex;flex-direction:column;gap:15px}
.pd-eye{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--cr);font-weight:600}
.pd-info h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;line-height:1.2;color:var(--dark)}
.pd-desc{font-size:14px;color:var(--muted);line-height:1.8}
.pd-meta span{font-size:12px;color:var(--muted);display:block}
.pd-meta span b{color:var(--dark)}
.pd-rating{display:flex;align-items:center;gap:10px}
.pd-stars{color:var(--gold);font-size:15px;letter-spacing:1px}
.sz-row{display:flex;gap:7px;flex-wrap:wrap}
.sz-tag{padding:5px 12px;border:1.5px solid var(--bdr);border-radius:6px;font-size:12px;cursor:pointer;transition:var(--tr)}
.sz-tag.sel,.sz-tag:hover{border-color:var(--cr);background:#fdf3f3;color:var(--cr)}
.qty-ctl{display:flex;align-items:center;border:1.5px solid var(--bdr);border-radius:8px;overflow:hidden}
.qty-ctl button{background:none;border:none;width:36px;height:36px;font-size:18px;color:var(--dark);display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.qty-ctl button:hover{background:#fdf3f3;color:var(--cr)}
.qty-ctl span{width:40px;text-align:center;font-size:15px;font-weight:600}
.pd-btns{display:flex;gap:10px}
.btn-dark{flex:1;background:var(--dark);color:#fff;border:2px solid var(--dark);padding:13px;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:var(--tr);cursor:pointer}
.btn-dark:hover{background:var(--cr);border-color:var(--cr)}
.btn-dark.done{background:#218838;border-color:#218838}
.btn-wl{width:46px;height:46px;background:none;border:2px solid var(--bdr);border-radius:8px;font-size:20px;display:flex;align-items:center;justify-content:center;transition:var(--tr);cursor:pointer}
.btn-wl:hover,.btn-wl.on{border-color:var(--cr);color:var(--cr);background:#fdf3f3}

/* CART */
.cart-sec{padding:44px 58px;max-width:1200px;margin:0 auto}
.cart-lay{display:grid;grid-template-columns:1fr 350px;gap:34px;align-items:start}
.ctw{background:#fff;border-radius:var(--rad);box-shadow:var(--ss);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:linear-gradient(135deg,var(--dark),#3d1515)}
thead th{padding:15px 18px;text-align:left;color:var(--gold-l);font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;letter-spacing:1px}
tbody tr{border-bottom:1px solid var(--bdr);transition:background .2s}
tbody tr:hover{background:#fdf8f2}
tbody td{padding:14px 18px;font-size:13.5px;color:var(--char)}
.td-n{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--dark)}

function cartReducer(state, action) {
  switch (action.type) {
    case 'ADD':         return [...state, {...action.item, uid: Date.now() + Math.random()}];
    case 'REMOVE':      return state.filter(i => i.uid !== action.uid);
    case 'CLEAR':       return [];
    case 'UPDATE_SIZE': return state.map(i => i.uid === action.uid ? {...i, size: action.size} : i);
    default:            return state;
  }
}

function CustomCursor() {
  const dot  = useRef(null);
  const ring = useRef(null);
  const p    = useRef({mx:0,my:0,fx:0,fy:0,raf:null});

  useEffect(() => {
    const mv = e => {
      p.current.mx = e.clientX; p.current.my = e.clientY;
      if (dot.current)
        dot.current.style.transform = `translate(calc(${e.clientX}px - 50%),calc(${e.clientY}px - 50%))`;
    };
    const anim = () => {
      p.current.fx += (p.current.mx - p.current.fx) * .12;
      p.current.fy += (p.current.my - p.current.fy) * .12;
      if (ring.current)
        ring.current.style.transform = `translate(calc(${p.current.fx}px - 50%),calc(${p.current.fy}px - 50%))`;
      p.current.raf = requestAnimationFrame(anim);
    };
    document.addEventListener('mousemove', mv);
    p.current.raf = requestAnimationFrame(anim);
    return () => {
      document.removeEventListener('mousemove', mv);
      cancelAnimationFrame(p.current.raf);
    };
  }, []);

  useEffect(() => {
    const on  = () => { dot.current?.classList.add('hov');    ring.current?.classList.add('hov'); };
    const off = () => { dot.current?.classList.remove('hov'); ring.current?.classList.remove('hov'); };
    const t = setInterval(() => {
      document.querySelectorAll('a,button,.pcard,.cat-c')
        .forEach(el => { el.addEventListener('mouseenter', on); el.addEventListener('mouseleave', off); });
    }, 600);
    return () => clearInterval(t);
  }, []);

  return <><div id="cdot" ref={dot}/><div id="cring" ref={ring}/></>;
}

            <button style={{background:'none', border:'none', color:'var(--cr)', fontSize:12, fontWeight:600, cursor:'pointer', textDecoration:'underline'}}
              onClick={() => setShowSG(true)}>Size Guide</button>
          </div>
          <div className="sz-row">
            {['XS','S','M','L','XL','XXL'].map(s => (
              <button key={s} className={`sz-tag${selSz === s ? ' sel' : ''}`}
                onClick={() => setSelSz(s)}>{s}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:14}}>
          <span style={{fontSize:13, fontWeight:600, color:'var(--dark)'}}>Quantity:</span>
          <div className="qty-ctl">
            <button onClick={() => setQty(q => Math.max(1, q - 1))}>−</button>
            <span>{qty}</span>
            <button onClick={() => setQty(q => Math.min(10, q + 1))}>+</button>
          </div>
        </div>
        <div className="pd-btns">
          <button className={`btn-dark${added ? ' done' : ''}`}
            style={added ? {background:'#218838', borderColor:'#218838'} : {}}
            onClick={doAdd}>
            {added ? '✓ Added to Cart' : '🛒  Add to Cart'}
          </button>
          <button className={`btn-wl${wished ? ' on' : ''}`} onClick={() => toggleWish(product)}>
            {wished ? '❤️' : '♡'}
          </button>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:4}}>
          {['🚚 Free Shipping Above ₹2999','🔄 7-Day Returns','🛡️ Secure Payment'].map(t => (
            <span key={t} style={{fontSize:11, color:'var(--muted)', background:'var(--cream)', padding:'4px 10px', borderRadius:20, border:'1px solid var(--bdr)'}}>{t}</span>
          ))}
        </div>
      </div>
    </div>

    {related.length > 0 && (
      <section style={{padding:'0 58px 80px'}}>
        <div className="slabel" style={{marginBottom:28}}>
          <span className="seye">You May Also Like</span>
          <h2>Related Products</h2>
          <div className="sln"/>
        </div>
        <div className="pgrid">{related.map(p => <ProductCard key={p.id} product={p}/>)}</div>
      </section>
    )}
    {showSG && <SizeModal onClose={() => setShowSG(false)}/>}
  </>);
}

function CartPage({cart, dispatch, navigate}) {
  const {toast} = useContext(ToastCtx);
  const SIZES = ['XS','S','M','L','XL','XXL','Free Size'];
  const [step,      setStep]      = useState('cart');
  const [coupon,    setCoupon]    = useState('');
  const [cpnLabel,  setCpnLabel]  = useState('');
  const [discount,  setDiscount]  = useState(0);
  const [editIdx,   setEditIdx]   = useState(null);
  const [orderDone, setOrderDone] = useState(false);
  const [orderId]                 = useState('PS' + String(Date.now()).slice(-8));
  const [addr, setAddr] = useState({name:'', phone:'', pincode:'', address:'', city:'', state:'', type:'Home'});
  const [pay,  setPay]  = useState({method:'upi', upi:'', card:'', expiry:'', cvv:'', cardName:'', bank:''});

  const sub    = cart.reduce((s, i) => s + Number(i.price), 0);
  const ship   = sub >= 2999 ? 0 : 199;
  const cpnAmt = Math.round(sub * discount);
  const fest   = Math.round(sub * .05);
  const codFee = pay.method === 'cod' ? 50 : 0;
  const total  = sub + ship - fest - cpnAmt + codFee;

  const applyCpn = () => {
    const codes = {FESTIVE30: .30, SAVE20: .20, POSHAK10: .10};
    const v = codes[coupon.toUpperCase()];
    if (v) { setDiscount(v); setCpnLabel(Math.round(v*100) + '% OFF Applied!'); }
    else   { setCpnLabel('Invalid code. Try: FESTIVE30'); }
  };

  const STEP_LABELS = ['Cart', 'Address', 'Payment', 'Confirm'];
  const stepIdx = ['cart', 'address', 'payment', 'confirm'].indexOf(step);

  function StepBar() {
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', padding:'24px 0 32px'}}>
        {STEP_LABELS.map(function(s, i) {
          const done    = i < stepIdx;
          const current = i === stepIdx;
          const future  = i > stepIdx;
          return (
            <React.Fragment key={s}>
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6, minWidth:60}}>
                <div style={{
                  width:36, height:36, borderRadius:'50%',
                  background: future ? '#e8ddd0' : '#c1121f',
                  color: future ? '#8a7560' : '#fff',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:14, fontWeight:700
                }}>
                  {done ? '\u2713' : i + 1}
                </div>
                <div style={{
                  fontSize:11, fontWeight: current ? 700 : 400,
                  color: future ? 'var(--muted)' : '#c1121f', letterSpacing:.5
                }}>{s}</div>
              </div>
              {i < STEP_LABELS.length - 1 && (
                <div style={{
                  flex:1, height:2, margin:'0 4px', marginBottom:22,
                  background: done ? '#c1121f' : '#e8ddd0'
                }}/>
              )}
            </React.Fragment>
          );
        })}
      </div>
    );
  }

  
  if (orderDone) return (
    <div style={{minHeight:'60vh', display:'flex', alignItems:'center', justifyContent:'center', padding:40}}>
      <div style={{background:'#fff', borderRadius:20, padding:'48px 40px', maxWidth:480, width:'100%', textAlign:'center', boxShadow:'0 20px 60px rgba(0,0,0,.15)'}}>
        <div style={{fontSize:64, marginBottom:16}}>&#127881;</div>
        <h2 style={{fontFamily:"'Cormorant Garamond',serif", fontSize:30, color:'var(--dark)', marginBottom:8}}>Order Placed!</h2>
        <div style={{background:'#fdf8f2', borderRadius:10, padding:'12px 16px', margin:'14px 0', fontSize:13, color:'var(--muted)'}}>
          Order ID: <strong style={{color:'var(--dark)'}}>{orderId}</strong>
        </div>
        <p style={{color:'var(--muted)', fontSize:13.5, lineHeight:1.8, marginBottom:8}}>
          Thank you for shopping with Poshak Story.<br/>Expected delivery: 5-7 business days.
        </p>
        <div style={{background:'#fdf3f3', borderRadius:10, padding:'14px 16px', margin:'14px 0', fontSize:13, textAlign:'left', lineHeight:2}}>
          <div>Delivering to: {addr.name}, {addr.city} {addr.pincode}</div>
          <div>Total paid: Rs {total.toLocaleString('en-IN')}</div>
        </div>
        <button onClick={function() { navigate('track'); }}
          style={{width:'100%', background:'var(--dark)', color:'#fff', border:'none', padding:13, borderRadius:8, fontSize:13, fontWeight:600, letterSpacing:1.5, textTransform:'uppercase', marginBottom:10}}>
          Track Order
        </button>
        <button onClick={function() { dispatch({type:'CLEAR'}); navigate('home'); }}
          style={{width:'100%', background:'#c1121f', color:'#fff', border:'none', padding:13, borderRadius:8, fontSize:13, fontWeight:600, letterSpacing:1.5, textTransform:'uppercase'}}>
          Continue Shopping
        </button>
      </div>
    </div>
  );

  
  if (cart.length === 0) return (
    <div style={{padding:'56px'}}>
      <div className="emc">
        <span className="emico">&#128717;</span>
        <h3>Your cart is empty</h3>
        <p>Explore our beautiful collections and find something you love!</p>
        <button className="btn-p" style={{margin:'0 auto'}} onClick={function() { navigate('home'); }}>
          Explore Collections
        </button>
      </div>
    </div>
  );

  
  if (step === 'cart') return (
    <div>
      <div className="pgh">
        <span className="pg-eye">Shopping</span>
        <h1 className="pg-ttl">Your Cart</h1>
        <div className="pg-ln"/>
      </div>
      <button className="back-l" onClick={function() { navigate('home'); }}>&#8592; Continue Shopping</button>
      <section className="cart-sec">
        <StepBar/>
        <div className="cart-lay">
          <div>
            <div className="ctw">
              {cart.map(function(it, i) {
                return (
                  <div key={it.uid} style={{display:'flex', gap:14, padding:'16px 18px', borderBottom:'1px solid #e8ddd0', alignItems:'flex-start'}}>
                    <div style={{width:72, height:82, borderRadius:8, overflow:'hidden', background:'#f7f0e8', flexShrink:0}}>
                      <img src={it.img} alt={it.name}
                        style={{width:'100%', height:'100%', objectFit:'cover'}}
                        onError={function(e) { e.target.parentElement.style.background='linear-gradient(135deg,#f7e8d4,#e8c97a)'; e.target.remove(); }}/>
                    </div>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontFamily:"'Cormorant Garamond',serif", fontSize:15, fontWeight:600, color:'var(--dark)', marginBottom:4}}>{it.name}</div>
                      <div style={{fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:1, marginBottom:8}}>{it.sub || 'Ethnic Wear'}</div>
                      <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                        <span style={{fontSize:12, color:'var(--muted)'}}>Size:</span>
                        {editIdx === i ? (
                          <div style={{display:'flex', gap:5, flexWrap:'wrap'}}>
                            {SIZES.map(function(sz) {
                              return (
                                <button key={sz}
                                  onClick={function() { dispatch({type:'UPDATE_SIZE', uid:it.uid, size:sz}); setEditIdx(null); }}
                                  style={{
                                    padding:'3px 9px', borderRadius:5, fontSize:11.5,
                                    fontWeight: it.size===sz ? 700 : 400,
                                    border: '1.5px solid ' + (it.size===sz ? '#c1121f' : '#e8ddd0'),
                                    background: it.size===sz ? '#fdf3f3' : 'transparent',
                                    color: it.size===sz ? '#c1121f' : 'var(--char)'
                                  }}>
                                  {sz}
                                </button>
                              );
                            })}
                            <button onClick={function() { setEditIdx(null); }}
                              style={{padding:'3px 8px', border:'1px solid #e8ddd0', borderRadius:5, background:'none', fontSize:11, color:'var(--muted)'}}>
                              &#10005;
                            </button>
                          </div>
                        ) : (
                          <button onClick={function() { setEditIdx(i); }}
                            style={{display:'inline-flex', alignItems:'center', gap:5, padding:'3px 10px', borderRadius:5, border:'1.5px solid #e8ddd0', background:'#fdf8f2', fontSize:12, fontWeight:600, color:'var(--dark)'}}>
                            {it.size || 'M'} <span style={{fontSize:10, color:'#c1121f'}}>&#9998; Edit</span>
                          </button>
                        )}
                      </div>
                    </div>
                    <div style={{textAlign:'right', flexShrink:0}}>
                      <div style={{fontFamily:"'Cormorant Garamond',serif", fontSize:17, fontWeight:600, color:'#c1121f', marginBottom:8}}>
                        Rs {Number(it.price).toLocaleString('en-IN')}
                      </div>
                      <button className="rmb"
                        onClick={function() { dispatch({type:'REMOVE', uid:it.uid}); toast(it.name + ' removed'); }}>
                        &#10005;
                      </button>
                    </div>
                  </div>
                );
              })}
              <div style={{padding:'10px 18px', borderTop:'1px solid #e8ddd0'}}>
                <button className="chip" onClick={function() { dispatch({type:'CLEAR'}); }}>&#128465; Clear Cart</button>
              </div>
            </div>

            <div style={{marginTop:16, background:'#fff', borderRadius:'var(--rad)', padding:20, boxShadow:'var(--ss)'}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif", fontSize:17, fontWeight:600, marginBottom:12, color:'var(--dark)'}}>
                Apply Coupon
              </div>
              <div className="cpn-row">
                <input type="text" placeholder="e.g. FESTIVE30" value={coupon}
                  onChange={function(e) { setCoupon(e.target.value.toUpperCase()); }}/>
                <button onClick={applyCpn}>Apply</button>
              </div>
              {cpnLabel && <div style={{fontSize:13, marginTop:7, color:discount ? '#218838' : '#c1121f', fontWeight:500}}>{cpnLabel}</div>}
              <div style={{fontSize:11.5, color:'var(--muted)', marginTop:5}}>Try: FESTIVE30 · SAVE20 · POSHAK10</div>
            </div>
          </div>

          <div className="csum">
            <h3>Order Summary</h3>
            <div className="srow"><span>Subtotal ({cart.length} items)</span><span>Rs {sub.toLocaleString('en-IN')}</span></div>
            <div className="srow">
              <span>Shipping</span>
              <span style={{color: ship===0 ? '#218838' : 'inherit'}}>{ship===0 ? 'Free' : 'Rs ' + ship}</span>
            </div>
            <div className="srow">
              <span>Festive Discount (5%)</span>
              <span style={{color:'#218838'}}>-Rs {fest.toLocaleString('en-IN')}</span>
            </div>
            {discount > 0 && (
              <div className="srow">
                <span>Coupon ({Math.round(discount*100)}%)</span>
                <span style={{color:'#218838'}}>-Rs {cpnAmt.toLocaleString('en-IN')}</span>
              </div>
            )}
            <div className="stotal">
              <span>Total</span>
              <span style={{color:'#c1121f'}}>Rs {total.toLocaleString('en-IN')}</span>
            </div>
            {ship > 0 && (
              <div className="fsn">Add Rs {(2999-sub).toLocaleString('en-IN')} more for free shipping!</div>
            )}
            <button className="chk-btn" onClick={function() { setStep('address'); }}>
              Proceed to Address &#8594;
            </button>
            <div style={{textAlign:'center', marginTop:14, fontSize:11, color:'var(--muted)'}}>
              Secure and Encrypted Checkout
            </div>
          </div>
        </div>
      </section>
    </div>
  );

  
  if (step === 'address') return (
    <div>
      <div className="pgh">
        <span className="pg-eye">Shopping</span>
        <h1 className="pg-ttl">Delivery Address</h1>
        <div className="pg-ln"/>
      </div>
      <button className="back-l" onClick={function() { setStep('cart'); }}>&#8592; Back to Cart</button>
      <section className="cart-sec">
        <StepBar/>
        <div className="cart-lay">
          <div style={{background:'#fff', borderRadius:'var(--rad)', padding:28, boxShadow:'var(--ss)'}}>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:600, color:'var(--dark)', marginBottom:22}}>
              Shipping Address
            </h3>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
              {[
                {label:'Full Name',  key:'name',    ph:'Your full name',      full:false},
                {label:'Phone',      key:'phone',   ph:'10-digit mobile',     full:false},
                {label:'Address',    key:'address', ph:'House / Street / Area', full:true},
                {label:'Pincode',    key:'pincode', ph:'6-digit pincode',     full:false},
                {label:'City',       key:'city',    ph:'City name',           full:false},
                {label:'State',      key:'state',   ph:'State name',          full:false},
              ].map(function(f) {
                return (
                  <div key={f.key} style={{gridColumn: f.full ? '1/-1' : 'auto'}}>
                    <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', letterSpacing:.5, textTransform:'uppercase', marginBottom:6}}>{f.label}</label>
                    <input type="text" placeholder={f.ph} value={addr[f.key]}
                      onChange={function(e) { setAddr(Object.assign({}, addr, {[f.key]: e.target.value})); }}
                      onFocus={function(e) { e.target.style.borderColor='#c1121f'; }}
                      onBlur={function(e)  { e.target.style.borderColor='#e8ddd0'; }}
                      style={{width:'100%', padding:'11px 14px', border:'1.5px solid #e8ddd0', borderRadius:8, fontSize:13.5, outline:'none', background:'#fdf8f2', transition:'border-color .2s'}}/>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:18}}>
              <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', letterSpacing:.5, textTransform:'uppercase', marginBottom:10}}>Address Type</label>
              <div style={{display:'flex', gap:10}}>
                {['Home', 'Work', 'Other'].map(function(t) {
                  return (
                    <button key={t}
                      onClick={function() { setAddr(Object.assign({}, addr, {type:t})); }}
                      style={{
                        padding:'8px 20px', borderRadius:6, fontSize:13, transition:'all .2s',
                        fontWeight: addr.type===t ? 600 : 400,
                        border: '1.5px solid ' + (addr.type===t ? '#c1121f' : '#e8ddd0'),
                        background: addr.type===t ? '#fdf3f3' : 'transparent',
                        color: addr.type===t ? '#c1121f' : 'var(--char)'
                      }}>
                      {t}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="csum">
            <h3>Items in Cart ({cart.length})</h3>
            {cart.map(function(it) {
              return (
                <div key={it.uid} style={{display:'flex', gap:10, marginBottom:12, paddingBottom:12, borderBottom:'1px solid #e8ddd0', alignItems:'center'}}>
                  <div style={{width:44, height:50, borderRadius:6, overflow:'hidden', background:'#f7f0e8', flexShrink:0}}>
                    <img src={it.img} alt={it.name} style={{width:'100%', height:'100%', objectFit:'cover'}}
                      onError={function(e) { e.target.remove(); }}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5, fontWeight:600, color:'var(--dark)'}}>{it.name}</div>
                    <div style={{fontSize:11, color:'var(--muted)'}}>Size: {it.size || 'M'}</div>
                  </div>
                  <div style={{fontSize:13, fontWeight:600, color:'#c1121f', flexShrink:0}}>
                    Rs {Number(it.price).toLocaleString('en-IN')}
                  </div>
                </div>
              );
            })}
            <div className="stotal"><span>Total</span><span style={{color:'#c1121f'}}>Rs {total.toLocaleString('en-IN')}</span></div>
            <button className="chk-btn" onClick={function() {
              if (!addr.name || !addr.phone || !addr.address || !addr.pincode || !addr.city || !addr.state) {
                alert('Please fill all required fields');
                return;
              }
              setStep('payment');
            }}>
              Proceed to Payment &#8594;
            </button>
          </div>
        </div>
      </section>
    </div>
  );

  
  if (step === 'payment') return (
    <div>
      <div className="pgh">
        <span className="pg-eye">Shopping</span>
        <h1 className="pg-ttl">Payment</h1>
        <div className="pg-ln"/>
      </div>
      <button className="back-l" onClick={function() { setStep('address'); }}>&#8592; Back to Address</button>
      <section className="cart-sec">
        <StepBar/>
        <div className="cart-lay">
          <div style={{background:'#fff', borderRadius:'var(--rad)', padding:28, boxShadow:'var(--ss)'}}>
            <h3 style={{fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:600, color:'var(--dark)', marginBottom:22}}>
              Choose Payment Method
            </h3>
            <div style={{display:'flex', flexDirection:'column', gap:12, marginBottom:24}}>
              {[
                {id:'upi',        label:'UPI / Google Pay / PhonePe', note:'Instant confirmation, 0% fees',       noteColor:'#218838'},
                {id:'card',       label:'Credit / Debit Card',        note:'Visa, Mastercard, Rupay, Amex',       noteColor:'var(--muted)'},
                {id:'netbanking', label:'Net Banking',                 note:'All major banks supported',           noteColor:'var(--muted)'},
                {id:'cod',        label:'Cash on Delivery',            note:'Extra Rs 50 COD handling fee',        noteColor:'var(--muted)'},
              ].map(function(m) {
                var sel = pay.method === m.id;
                return (
                  <button key={m.id}
                    onClick={function() { setPay(Object.assign({}, pay, {method: m.id})); }}
                    style={{
                      display:'flex', alignItems:'center', gap:14, padding:'14px 18px',
                      borderRadius:10, textAlign:'left', transition:'all .2s',
                      border: '2px solid ' + (sel ? '#c1121f' : '#e8ddd0'),
                      background: sel ? '#fdf3f3' : '#fff'
                    }}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14, fontWeight:600, color:'var(--dark)'}}>{m.label}</div>
                      <div style={{fontSize:11.5, color: m.noteColor, marginTop:2}}>{m.note}</div>
                    </div>
                    <div style={{
                      width:18, height:18, borderRadius:'50%', flexShrink:0,
                      border: '2px solid ' + (sel ? '#c1121f' : '#e8ddd0'),
                      background: sel ? '#c1121f' : 'transparent'
                    }}/>
                  </button>
                );
              })}
            </div>

            {pay.method === 'upi' && (
              <div style={{padding:16, background:'#fdf8f2', borderRadius:10, border:'1px solid #e8ddd0'}}>
                <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', letterSpacing:.5, textTransform:'uppercase', marginBottom:8}}>UPI ID</label>
                <input type="text" placeholder="yourname@upi" value={pay.upi}
                  onChange={function(e) { setPay(Object.assign({}, pay, {upi: e.target.value})); }}
                  onFocus={function(e) { e.target.style.borderColor='#c1121f'; }}
                  onBlur={function(e)  { e.target.style.borderColor='#e8ddd0'; }}
                  style={{width:'100%', padding:'11px 14px', border:'1.5px solid #e8ddd0', borderRadius:8, fontSize:13.5, outline:'none', background:'#fff'}}/>
                <div style={{fontSize:11.5, color:'var(--muted)', marginTop:5}}>Format: name@okicici / name@ybl / name@paytm</div>
              </div>
            )}

            {pay.method === 'card' && (
              <div style={{padding:16, background:'#fdf8f2', borderRadius:10, border:'1px solid #e8ddd0', display:'grid', gridTemplateColumns:'1fr 1fr', gap:14}}>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', letterSpacing:.5, textTransform:'uppercase', marginBottom:6}}>Card Number</label>
                  <input type="text" placeholder="1234 5678 9012 3456" maxLength={19} value={pay.card}
                    onChange={function(e) {
                      var v = e.target.value.replace(/[^0-9]/g,'').slice(0,16);
                      var spaced = v.match(/.{1,4}/g);
                      setPay(Object.assign({}, pay, {card: spaced ? spaced.join(' ') : ''}));
                    }}
                    onFocus={function(e) { e.target.style.borderColor='#c1121f'; }}
                    onBlur={function(e)  { e.target.style.borderColor='#e8ddd0'; }}
                    style={{width:'100%', padding:'11px 14px', border:'1.5px solid #e8ddd0', borderRadius:8, fontSize:14, outline:'none', background:'#fff', letterSpacing:2}}/>
                </div>
                <div style={{gridColumn:'1/-1'}}>
                  <label style={{display:'block', fontSize:12, fontWeight:600, color:'var(--muted)', letterSpacing:.5, textTransform:'uppercase', marginBottom:6}}>Name on Card</label>
                  <input type="text" placeholder="Full name" value={pay.cardName}
                    onChange={function(e) { setPay(Object.assign({}, pay, {cardName: e.target.value})); }}
                    onFocus={function(e) { e.target.style.borderColor='#c1121f'; }}
                    onBlur={function(e)  { e.target.style.borderColor='#e8ddd0'; }}
                    style={{width:'100%', padding:'11px 14px', border:'1.5px solid #e8ddd0', borderRadius:8, fontSize:13.5, outline:'none', background:'#fff'}}/>
                </div>

function TrackPage() {
  const [orderId, setOrderId] = useState('');

  const navigate = useContext(NavCtx);

  const MOCK = {
    'PS-2025-001': {status:'Out for Delivery', steps:[
      {l:'Order Placed',     d:'Feb 18, 2025', st:'done'},
      {l:'Payment Confirmed',d:'Feb 18, 2025', st:'done'},
      {l:'Packed & Shipped', d:'Feb 19, 2025', st:'done'},
      {l:'In Transit',       d:'Feb 20, 2025', st:'done'},
      {l:'Out for Delivery', d:'Feb 22, 2025', st:'now'},
      {l:'Delivered',        d:'Expected Feb 22', st:'pend'},
    ]},
    'PS-2025-002': {status:'Packed & Shipped', steps:[
      {l:'Order Placed',     d:'Feb 20, 2025', st:'done'},
      {l:'Payment Confirmed',d:'Feb 20, 2025', st:'done'},
      {l:'Packed & Shipped', d:'Feb 21, 2025', st:'now'},
      {l:'In Transit',       d:'Expected Feb 23', st:'pend'},
      {l:'Out for Delivery', d:'Expected Feb 24', st:'pend'},

          value={orderId}
          onChange={e => setOrderId(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && track()}/>
        <p style={{fontSize:11.5, color:'var(--muted)', marginBottom:14}}>

              <p style={{color:'var(--cr)', fontSize:14, fontWeight:500}}>
                ❌ Order not found. Please check your order ID.

              <p style={{fontFamily:"'Cormorant Garamond',serif", fontSize:18, fontWeight:600, marginBottom:20, color:'var(--dark)'}}>
                Status: <span style={{color:'var(--cr)'}}>{result.status}</span>

                <div key={i} className="tstep">
                  <div className={`tdot ${s.st}`}>{s.st==='done'?'✓':s.st==='now'?'●':'○'}</div>
                  <div className="tinfo"><h4>{s.l}</h4><p>{s.d}</p></div>
                </div>
              ))}
            </>)}
          </div>
        )}
      </div>
    </div>
  </>);
}

/* ══════════════════════════════════════════════════════════════
   STORE HOURS CLOCK  — live canvas clock in footer
   ══════════════════════════════════════════════════════════════ */

const STORE_HOURS = [
  { day:'Sun', open:11, close:20 },
  { day:'Mon', open:10, close:21 },
  { day:'Tue', open:10, close:21 },
  { day:'Wed', open:10, close:21 },
  { day:'Thu', open:10, close:21 },
  { day:'Fri', open:10, close:22 },
  { day:'Sat', open:10, close:22 },
];

function drawStoreClockCanvas(canvas, size) {
  const ctx = canvas.getContext('2d');
  const cx  = size / 2, cy = size / 2, r = size / 2 - 3;
  const now = new Date();
  const hr  = now.getHours() % 12 + now.getMinutes() / 60;
  const mn  = now.getMinutes() + now.getSeconds() / 60;
  const sc  = now.getSeconds() + now.getMilliseconds() / 1000;

  ctx.clearRect(0, 0, size, size);

  // face
  const bg = ctx.createRadialGradient(cx, cy - r * 0.1, r * 0.05, cx, cy, r);
  bg.addColorStop(0, '#2d1e10'); bg.addColorStop(1, '#150e06');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = bg; ctx.fill();

  // outer gold ring
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.5; ctx.stroke();

  // inner ring
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.87, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(201,168,76,0.2)'; ctx.lineWidth = 1; ctx.stroke();

  // hour ticks
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const maj = i % 3 === 0;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r * (maj ? 0.71 : 0.79), cy + Math.sin(a) * r * (maj ? 0.71 : 0.79));
    ctx.lineTo(cx + Math.cos(a) * r * 0.87,               cy + Math.sin(a) * r * 0.87);
    ctx.strokeStyle = maj ? '#c9a84c' : 'rgba(201,168,76,0.4)';
    ctx.lineWidth   = maj ? 2.5 : 1.2; ctx.lineCap = 'round'; ctx.stroke();
  }

  // minute ticks
  for (let i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r * 0.83, cy + Math.sin(a) * r * 0.83);
    ctx.lineTo(cx + Math.cos(a) * r * 0.87, cy + Math.sin(a) * r * 0.87);
    ctx.strokeStyle = 'rgba(201,168,76,0.18)'; ctx.lineWidth = 1; ctx.stroke();
  }

  // hand helper
  function hand(angle, len, w, color) {
    const tail = len * 0.2;
    ctx.beginPath();
    ctx.moveTo(cx - Math.cos(angle) * tail, cy - Math.sin(angle) * tail);
    ctx.lineTo(cx + Math.cos(angle) * len,  cy + Math.sin(angle) * len);
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.stroke();
  }

  // hour hand
  hand((hr / 12) * Math.PI * 2 - Math.PI / 2, r * 0.48, size > 80 ? 4.5 : 3, '#e8c97a');
  // minute hand
  hand((mn / 60) * Math.PI * 2 - Math.PI / 2, r * 0.62, size > 80 ? 3 : 2, '#ffffff');
  // second hand
  hand((sc / 60) * Math.PI * 2 - Math.PI / 2, r * 0.68, 1.5, '#c1121f');

  // centre jewel
  ctx.beginPath(); ctx.arc(cx, cy, size > 80 ? 5 : 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#c9a84c'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, size > 80 ? 2.5 : 1.8, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function StoreHoursClock() {
  const canvasRef = useRef(null);
  const rafRef    = useRef(null);
  const [timeStr, setTimeStr] = useState('');
  const [dateStr, setDateStr] = useState('');
  const [isOpen,  setIsOpen]  = useState(false);
  const [statusMsg, setStatusMsg] = useState('');
  const SIZE = 130;

  const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width = SIZE; canvas.height = SIZE;

    const tick = () => {
      const now  = new Date();
      drawStoreClockCanvas(canvas, SIZE);

      const hh  = String(now.getHours()).padStart(2,'0');
      const mm  = String(now.getMinutes()).padStart(2,'0');
      const ss  = String(now.getSeconds()).padStart(2,'0');
      const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      setTimeStr(`${hh}:${mm}:${ss} ${ampm}`);
      setDateStr(`${FULL_DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`);

      const today = STORE_HOURS[now.getDay()];
      const h = now.getHours() + now.getMinutes() / 60;
      const open = h >= today.open && h < today.close;
      setIsOpen(open);
      if (open) {
        const minsLeft = Math.round((today.close - h) * 60);
        if (minsLeft <= 60) {
          setStatusMsg(`Closing in ${minsLeft} min`);
        } else {
          setStatusMsg(`Open until ${today.close > 12 ? today.close - 12 : today.close}:00 ${today.close >= 12 ? 'PM' : 'AM'}`);
        }
      } else {
        // find next open day
        let next = null;
        for (let d = 1; d <= 7; d++) {
          const idx = (now.getDay() + d) % 7;
          next = STORE_HOURS[idx];
          if (next) { next = { ...next, label: d === 1 ? 'Tomorrow' : FULL_DAYS[(now.getDay()+d)%7] }; break; }
        }
        setStatusMsg(next ? `Opens ${next.label} at ${next.open}:00 AM` : 'Check back soon');
      }

      rafRef.current = requestAnimationFrame(tick);
    };
    tick();
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  return (
    <div className="store-clock-bar">
      <div className="sc-canvas-wrap">
        <canvas ref={canvasRef} width={SIZE} height={SIZE}/>
        <div className={`sc-status-dot ${isOpen ? 'open' : 'closed'}`}/>
      </div>

      <div className="sc-info">
        <div className="sc-time">{timeStr}</div>
        <div className="sc-date">{dateStr}</div>
        <div className={`sc-badge ${isOpen ? 'open' : 'closed'}`}>
          <span style={{fontSize:8}}>{isOpen ? '●' : '●'}</span>
          {isOpen ? 'Store Open' : 'Store Closed'}
        </div>
        <div className="sc-msg">{statusMsg}</div>
      </div>

      <div className="sc-hours">
        <div className="sc-hours-title">Store Hours · IST</div>
        {STORE_HOURS.map((d, i) => {
          const todayIdx = new Date().getDay();
          const isToday  = i === todayIdx;
          return (
            <div key={d.day} className={`sc-hour-row${isToday ? ' today' : ''}`}>
              <span className="day-label">{isToday ? <strong>{d.day}</strong> : d.day}</span>
              <span className="time-label">
                {`${d.open > 12 ? d.open-12 : d.open}${d.open >= 12 ? 'pm' : 'am'} – ${d.close > 12 ? d.close-12 : d.close}${d.close >= 12 ? 'pm' : 'am'}`}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScrollTop() {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const h = () => setVis(window.scrollY > 400);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h); 
  }, []);
  if (!vis) return null;
  return (
    <button className="st-btn"
      onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>↑</button>
  );
}

function App() {
  
  const [cart, dispatch] = useReducer(cartReducer, []);

  
  const [page,     setPage]     = useState('home');
  const [searchQ,  setSearchQ]  = useState('');

  
  const [tmsg,  setTmsg]  = useState('');
  const [tshow, setTshow] = useState(false);
  const tr = useRef(null);

  
  const [wishlist, setWishlist] = useState(() =>
    JSON.parse(localStorage.getItem('ps_wl') || '[]')
  );

  
  const navigate = useCallback((route) => {
    setPage(route);
    setSearchQ('');
    window.scrollTo({top: 0, behavior: 'smooth'});
  }, []);

  
  const toast = useCallback((msg) => {
    setTmsg(msg); setTshow(true);
    clearTimeout(tr.current);
    tr.current = setTimeout(() => setTshow(false), 3200);
  }, []);

  
  const toggleWish = useCallback((product) => {
    setWishlist(prev => {
      const exists = prev.some(w => w.id === product.id);
      const next   = exists ? prev.filter(w => w.id !== product.id) : [...prev, product];
      localStorage.setItem('ps_wl', JSON.stringify(next));
      return next;
    });
  }, []);

  
  const renderPage = () => {
    if (page === 'home')             return <HomePage/>;
    if (page === 'cart')             return <CartPage cart={cart} dispatch={dispatch} navigate={navigate}/>;
    if (page === 'wishlist')         return <WishlistPage/>;
    if (page === 'track')            return <TrackPage/>;
    if (page === 'size-guide')       return <SizeGuidePage/>;
    if (page === 'shipping')         return <ShippingPage/>;
    if (page === 'returns')          return <ReturnsPage/>;
    if (page.startsWith('detail:'))  return <DetailPage productId={page.split(':')[1]}/>;
    if (CATS[page])                  return <ProductListPage cat={page}/>;
    return <HomePage/>;
  };

  
  const cartCtx  = useMemo(() => ({cart, dispatch}), [cart]);
  const toastCtx = useMemo(() => ({toast}), [toast]);
  const wishCtx  = useMemo(() => ({wishlist, toggleWish}), [wishlist, toggleWish]);

  return (
    
    <CartCtx.Provider value={cartCtx}>
    <ToastCtx.Provider value={toastCtx}>
    <WishCtx.Provider value={wishCtx}>
    <NavCtx.Provider value={navigate}>
      <CustomCursor/>
      <Topbar searchQ={searchQ} setSearchQ={setSearchQ}/>
      
      <main className="page-in" key={page}>{renderPage()}</main>
      <Footer/>
      <ScrollTop/>
      <Toast msg={tmsg} show={tshow}/>
    </NavCtx.Provider>
    </WishCtx.Provider>
    </ToastCtx.Provider>
    </CartCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
